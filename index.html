<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>网格拼图 · 手机适配版</title>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #f5f7fb;
            color: #1e1e2f;
            padding: 12px 8px 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .app {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            padding: 18px 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        h1 {
            font-size: 1.6rem;
            font-weight: 650;
            letter-spacing: -0.02em;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .badge {
            background: #e6edf5;
            color: #2c5f8a;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 400;
        }
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 12px;
            background: #fafbfc;
            padding: 14px 12px;
            border-radius: 24px;
            border: 1px solid #e9ecf0;
        }
        .tool-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: white;
            padding: 4px 10px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }
        .tool-group label {
            font-weight: 500;
            color: #334155;
            font-size: 0.85rem;
        }
        input[type="number"] {
            width: 65px;
            padding: 8px 6px;
            border: none;
            background: transparent;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            outline: none;
        }
        button {
            background: white;
            border: 1px solid #cfd9e2;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.9rem;
            color: #1e293b;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            background: #ffffff;
            flex: 0 0 auto;
        }
        button.primary {
            background: #1e293b;
            border-color: #1e293b;
            color: white;
        }
        button.primary:hover {
            background: #0f172a;
        }
        button:active {
            background: #eef2ff;
            transform: scale(0.97);
        }
        .file-input-wrapper {
            position: relative;
            display: inline-block;
        }
        .file-input-wrapper input {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        .canvas-area {
            background: #f8fafc;
            border-radius: 20px;
            padding: 16px 8px;
            border: 1px solid #e9ecf0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .preview-wrapper {
            width: 100%;
            overflow-x: auto;
            display: flex;
            justify-content: center;
            border-radius: 16px;
            background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            padding: 8px;
        }
        canvas#previewCanvas {
            display: block;
            max-width: 100%;
            height: auto;
            border-radius: 12px;
            background: white;
        }
        .pagination-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 16px;
            width: 100%;
            flex-wrap: wrap;
            gap: 8px;
        }
        .page-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .page-info {
            font-weight: 600;
            background: #eef2ff;
            padding: 6px 16px;
            border-radius: 40px;
            color: #1e3a8a;
            font-size: 0.9rem;
        }
        .stats {
            color: #475569;
            font-size: 0.8rem;
            background: #f1f5f9;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .thumbnail-section {
            margin-top: 4px;
        }
        .thumb-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
            padding: 0 4px;
        }
        .thumb-header span:first-child {
            font-weight: 600;
            font-size: 0.95rem;
            color: #1e293b;
        }
        .image-count-badge {
            background: #dbeafe;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        .thumb-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding: 8px 4px 12px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .thumb-item {
            flex: 0 0 90px;
            aspect-ratio: 9/16;
            background: #e2e8f0;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid transparent;
            cursor: grab;
            transition: 0.1s;
            position: relative;
            scroll-snap-align: start;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .thumb-item:active {
            cursor: grabbing;
        }
        .thumb-item.dragging {
            opacity: 0.5;
            border: 2px dashed #3b82f6;
        }
        .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        .thumb-index {
            position: absolute;
            bottom: 6px;
            left: 6px;
            background: rgba(0,0,0,0.65);
            color: white;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 30px;
            font-weight: 500;
        }
        .export-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 12px 0 8px;
        }
        .export-actions button {
            flex: 1 1 140px;
            padding: 14px 10px;
            font-size: 1rem;
        }
        .divider {
            width: 1px;
            height: 20px;
            background: #d1d9e6;
            margin: 0 4px;
        }
        .slider-label {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        input[type="range"] {
            width: 120px;
        }
        select {
            padding: 8px 12px;
            border-radius: 30px;
            border: 1px solid #cfd9e2;
            background: white;
            font-size: 0.9rem;
            outline: none;
        }
        .footer-note {
            text-align: center;
            color: #64748b;
            font-size: 0.75rem;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="app">
    <h1>
        🧩 格·拼图
        <span class="badge">单图9:16 · 智能分页</span>
    </h1>
    
    <div class="toolbar">
        <div class="file-input-wrapper">
            <button>📂 导入</button>
            <input type="file" id="fileInput" accept="image/*" multiple>
        </div>
        
        <div class="tool-group">
            <label>行</label>
            <input type="number" id="rowsInput" min="1" max="20" value="3">
        </div>
        <div class="tool-group">
            <label>列</label>
            <input type="number" id="colsInput" min="1" max="20" value="3">
        </div>
        <button id="nineGridBtn">🔲 九宫格</button>
        
        <div class="slider-label">
            <span style="font-size:0.85rem;">🔢</span>
            <input type="range" id="fontSizeSlider" min="12" max="48" value="24" step="1">
            <span id="fontSizeValue" style="min-width:45px;">24px</span>
        </div>
        
        <select id="scaleSelect" style="margin-left:auto;">
            <option value="1">1x</option>
            <option value="2" selected>2x</option>
            <option value="3">3x</option>
            <option value="4">4x</option>
        </select>
    </div>

    <div class="canvas-area">
        <div class="preview-wrapper">
            <canvas id="previewCanvas"></canvas>
        </div>
        
        <div class="pagination-bar">
            <div class="page-control">
                <button id="prevPageBtn" disabled>◀</button>
                <span class="page-info" id="pageIndicator">第 1 / 1 页</span>
                <button id="nextPageBtn" disabled>▶</button>
            </div>
            <div class="stats" id="statsText"></div>
        </div>
    </div>

    <div class="thumbnail-section">
        <div class="thumb-header">
            <span>📋 图片队列</span>
            <span class="image-count-badge" id="imageCount">0</span>
        </div>
        <div class="thumb-scroll" id="thumbList"></div>
        <div style="font-size:0.7rem; color:#6b7280; margin-top:4px; padding-left:6px;">
            👆 左右滑动 · 长按拖拽排序
        </div>
    </div>

    <div class="export-actions">
        <button id="exportCurrentBtn" class="primary">⬇ 导出当前页</button>
        <button id="exportAllBtn">📦 导出全部 (ZIP)</button>
    </div>
    
    <div class="footer-note">
        ⚡ 单张图片固定9:16比例 · 编号字号可调 · 上限9999张
    </div>
</div>

<script>
    (function(){
        "use strict";

        let images = [];
        let currentPage = 0;
        let rows = 3;
        let cols = 3;
        let fontSize = 24;
        const ASPECT_RATIO = 9 / 16;
        const BASE_CELL_WIDTH = 160;
        
        const fileInput = document.getElementById('fileInput');
        const rowsInput = document.getElementById('rowsInput');
        const colsInput = document.getElementById('colsInput');
        const nineGridBtn = document.getElementById('nineGridBtn');
        const fontSizeSlider = document.getElementById('fontSizeSlider');
        const fontSizeValue = document.getElementById('fontSizeValue');
        const scaleSelect = document.getElementById('scaleSelect');
        const exportCurrentBtn = document.getElementById('exportCurrentBtn');
        const exportAllBtn = document.getElementById('exportAllBtn');
        const prevPageBtn = document.getElementById('prevPageBtn');
        const nextPageBtn = document.getElementById('nextPageBtn');
        const pageIndicator = document.getElementById('pageIndicator');
        const statsText = document.getElementById('statsText');
        const imageCountSpan = document.getElementById('imageCount');
        const thumbList = document.getElementById('thumbList');
        const previewCanvas = document.getElementById('previewCanvas');
        const previewCtx = previewCanvas.getContext('2d');

        const BASE_CELL_HEIGHT = BASE_CELL_WIDTH / ASPECT_RATIO;

        CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            this.moveTo(x + r, y);
            this.lineTo(x + w - r, y);
            this.quadraticCurveTo(x + w, y, x + w, y + r);
            this.lineTo(x + w, y + h - r);
            this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            this.lineTo(x + r, y + h);
            this.quadraticCurveTo(x, y + h, x, y + h - r);
            this.lineTo(x, y + r);
            this.quadraticCurveTo(x, y, x + r, y);
            return this;
        };

        function updateImageCountDisplay() {
            imageCountSpan.textContent = images.length;
        }

        function getTotalPages() {
            const perPage = rows * cols;
            if (perPage === 0) return 0;
            return Math.ceil(images.length / perPage);
        }

        function getCurrentPageImages() {
            const perPage = rows * cols;
            const start = currentPage * perPage;
            return images.slice(start, start + perPage);
        }

        function renderPreview() {
            const totalPages = getTotalPages();
            if (images.length === 0) {
                previewCanvas.width = 300;
                previewCanvas.height = 200;
                previewCtx.fillStyle = '#f1f5f9';
                previewCtx.fillRect(0,0,300,200);
                previewCtx.font = '14px system-ui';
                previewCtx.fillStyle = '#64748b';
                previewCtx.textAlign = 'center';
                previewCtx.fillText('点击“导入”选择图片', 150, 100);
                pageIndicator.textContent = `第 0 / 0 页`;
                statsText.textContent = '';
                prevPageBtn.disabled = true;
                nextPageBtn.disabled = true;
                return;
            }

            if (currentPage >= totalPages) currentPage = totalPages - 1;
            if (currentPage < 0) currentPage = 0;

            const pageImages = getCurrentPageImages();
            const canvasWidth = cols * BASE_CELL_WIDTH;
            const canvasHeight = rows * BASE_CELL_HEIGHT;
            previewCanvas.width = canvasWidth;
            previewCanvas.height = canvasHeight;
            
            previewCtx.fillStyle = '#ffffff';
            previewCtx.fillRect(0, 0, canvasWidth, canvasHeight);
            
            for (let i = 0; i < rows * cols; i++) {
                const r = Math.floor(i / cols);
                const c = i % cols;
                const x = c * BASE_CELL_WIDTH;
                const y = r * BASE_CELL_HEIGHT;
                
                previewCtx.fillStyle = '#f8fafc';
                previewCtx.fillRect(x, y, BASE_CELL_WIDTH, BASE_CELL_HEIGHT);
                
                const imgData = pageImages[i];
                if (imgData) {
                    const img = imgData.img;
                    const imgRatio = img.width / img.height;
                    let drawWidth, drawHeight, offsetX, offsetY;
                    if (imgRatio > ASPECT_RATIO) {
                        drawHeight = BASE_CELL_HEIGHT;
                        drawWidth = drawHeight * imgRatio;
                        offsetX = (BASE_CELL_WIDTH - drawWidth) / 2;
                        offsetY = 0;
                    } else {
                        drawWidth = BASE_CELL_WIDTH;
                        drawHeight = drawWidth / imgRatio;
                        offsetX = 0;
                        offsetY = (BASE_CELL_HEIGHT - drawHeight) / 2;
                    }
                    previewCtx.drawImage(img, x + offsetX, y + offsetY, drawWidth, drawHeight);
                    
                    const number = imgData.order + 1;
                    const text = `${number}`;
                    previewCtx.font = `600 ${fontSize}px system-ui, -apple-system, sans-serif`;
                    previewCtx.textAlign = 'center';
                    previewCtx.textBaseline = 'bottom';  // 修复：底部对齐
                    
                    const textX = x + BASE_CELL_WIDTH / 2;
                    const textY = y + BASE_CELL_HEIGHT - 6;  // 距离底部6px
                    
                    const metrics = previewCtx.measureText(text);
                    const textHeight = fontSize * 0.9;  // 近似实际高度
                    const padding = 6;
                    
                    previewCtx.fillStyle = 'rgba(0,0,0,0.5)';
                    previewCtx.beginPath();
                    previewCtx.roundRect(
                        textX - metrics.width/2 - padding,
                        textY - textHeight - padding/2,
                        metrics.width + padding*2,
                        textHeight + padding,
                        20
                    );
                    previewCtx.fill();
                    
                    previewCtx.fillStyle = '#ffffff';
                    previewCtx.fillText(text, textX, textY);
                }
                
                previewCtx.strokeStyle = '#e2e8f0';
                previewCtx.lineWidth = 0.5;
                previewCtx.strokeRect(x, y, BASE_CELL_WIDTH, BASE_CELL_HEIGHT);
            }
            
            pageIndicator.textContent = `第 ${currentPage+1} / ${totalPages} 页`;
            prevPageBtn.disabled = (currentPage === 0);
            nextPageBtn.disabled = (currentPage === totalPages - 1);
            statsText.textContent = `每页${rows*cols}张 · 共${images.length}张`;
        }

        function renderThumbnails() {
            thumbList.innerHTML = '';
            images.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = 'thumb-item';
                div.draggable = true;
                div.setAttribute('data-index', idx);
                
                const imgEl = document.createElement('img');
                imgEl.src = item.img.src;
                div.appendChild(imgEl);
                
                const indexSpan = document.createElement('span');
                indexSpan.className = 'thumb-index';
                indexSpan.textContent = item.order + 1;
                div.appendChild(indexSpan);
                
                div.addEventListener('dragstart', handleDragStart);
                div.addEventListener('dragenter', handleDragEnter);
                div.addEventListener('dragover', handleDragOver);
                div.addEventListener('drop', handleDrop);
                div.addEventListener('dragend', handleDragEnd);
                
                thumbList.appendChild(div);
            });
        }

        let dragSourceIndex = null;
        function handleDragStart(e) {
            dragSourceIndex = parseInt(e.currentTarget.getAttribute('data-index'));
            e.dataTransfer.effectAllowed = 'move';
            e.currentTarget.classList.add('dragging');
        }
        function handleDragOver(e) { e.preventDefault(); }
        function handleDragEnter(e) { e.preventDefault(); }
        function handleDrop(e) {
            e.preventDefault();
            const targetIndex = parseInt(e.currentTarget.getAttribute('data-index'));
            if (dragSourceIndex !== null && targetIndex !== dragSourceIndex) {
                [images[dragSourceIndex], images[targetIndex]] = [images[targetIndex], images[dragSourceIndex]];
                images.forEach((img, i) => img.order = i);
                renderThumbnails();
                renderPreview();
                updateImageCountDisplay();
            }
        }
        function handleDragEnd(e) {
            document.querySelectorAll('.thumb-item').forEach(el => el.classList.remove('dragging'));
            dragSourceIndex = null;
        }

        function importImages(files) {
            const fileArray = Array.from(files).slice(0, 9999);
            if (!fileArray.length) return;
            
            const loadPromises = fileArray.map((file, idx) => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.onload = () => resolve({ img, order: images.length + idx });
                    img.onerror = () => resolve(null);
                    img.src = URL.createObjectURL(file);
                });
            });
            
            Promise.all(loadPromises).then(newImgs => {
                const valid = newImgs.filter(v => v);
                images = images.concat(valid).slice(0, 9999);
                images.forEach((item, i) => item.order = i);
                currentPage = 0;
                updateImageCountDisplay();
                renderThumbnails();
                renderPreview();
                fileInput.value = '';
            });
        }

        async function exportPageAsBlob(pageIndex, scaleFactor) {
            const total = getTotalPages();
            if (pageIndex < 0 || pageIndex >= total) return null;
            const start = pageIndex * rows * cols;
            const pageImages = images.slice(start, start + rows * cols);
            
            const cellW = BASE_CELL_WIDTH * scaleFactor;
            const cellH = BASE_CELL_HEIGHT * scaleFactor;
            const canvasW = cols * cellW;
            const canvasH = rows * cellH;
            
            const offCanvas = document.createElement('canvas');
            offCanvas.width = canvasW;
            offCanvas.height = canvasH;
            const ctx = offCanvas.getContext('2d', { alpha: false });
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvasW, canvasH);
            
            for (let i = 0; i < rows * cols; i++) {
                const r = Math.floor(i / cols);
                const c = i % cols;
                const x = c * cellW, y = r * cellH;
                ctx.fillStyle = '#f8fafc';
                ctx.fillRect(x, y, cellW, cellH);
                
                const imgData = pageImages[i];
                if (imgData) {
                    const img = imgData.img;
                    const imgRatio = img.width / img.height;
                    let drawWidth, drawHeight, offsetX, offsetY;
                    if (imgRatio > ASPECT_RATIO) {
                        drawHeight = cellH;
                        drawWidth = drawHeight * imgRatio;
                        offsetX = (cellW - drawWidth) / 2;
                        offsetY = 0;
                    } else {
                        drawWidth = cellW;
                        drawHeight = drawWidth / imgRatio;
                        offsetX = 0;
                        offsetY = (cellH - drawHeight) / 2;
                    }
                    ctx.drawImage(img, x + offsetX, y + offsetY, drawWidth, drawHeight);
                    
                    const number = imgData.order + 1;
                    const scaledFont = fontSize * scaleFactor;
                    ctx.font = `600 ${scaledFont}px system-ui, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    
                    const textX = x + cellW/2;
                    const textY = y + cellH - 6 * scaleFactor;
                    const text = `${number}`;
                    const metrics = ctx.measureText(text);
                    const textHeight = scaledFont * 0.9;
                    const pad = 6 * scaleFactor;
                    
                    ctx.fillStyle = 'rgba(0,0,0,0.5)';
                    ctx.beginPath();
                    ctx.roundRect(
                        textX - metrics.width/2 - pad,
                        textY - textHeight - pad/2,
                        metrics.width + pad*2,
                        textHeight + pad,
                        30
                    );
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText(text, textX, textY);
                }
            }
            return new Promise(resolve => offCanvas.toBlob(resolve, 'image/png'));
        }

        async function exportCurrent() {
            if (!images.length) { alert('请先导入图片'); return; }
            const scale = parseInt(scaleSelect.value);
            const blob = await exportPageAsBlob(currentPage, scale);
            if (blob) saveAs(blob, `拼图_第${currentPage+1}页_${rows}x${cols}.png`);
        }

        async function exportAllAsZip() {
            if (!images.length) { alert('请先导入图片'); return; }
            const total = getTotalPages();
            const scale = parseInt(scaleSelect.value);
            const zip = new JSZip();
            exportAllBtn.textContent = '打包中...';
            exportAllBtn.disabled = true;
            for (let p = 0; p < total; p++) {
                const blob = await exportPageAsBlob(p, scale);
                if (blob) zip.file(`拼图_第${p+1}页_${rows}x${cols}.png`, blob);
            }
            const content = await zip.generateAsync({ type: 'blob' });
            saveAs(content, `拼图全部_${rows}x${cols}_共${total}页.zip`);
            exportAllBtn.textContent = '📦 导出全部 (ZIP)';
            exportAllBtn.disabled = false;
        }

        function updateGrid() {
            rows = Math.min(20, Math.max(1, parseInt(rowsInput.value)||1));
            cols = Math.min(20, Math.max(1, parseInt(colsInput.value)||1));
            rowsInput.value = rows; colsInput.value = cols;
            currentPage = 0;
            renderPreview();
        }

        fileInput.addEventListener('change', e => importImages(e.target.files));
        rowsInput.addEventListener('change', updateGrid);
        colsInput.addEventListener('change', updateGrid);
        nineGridBtn.addEventListener('click', () => { rowsInput.value = 3; colsInput.value = 3; updateGrid(); });
        fontSizeSlider.addEventListener('input', e => {
            fontSize = parseInt(e.target.value);
            fontSizeValue.textContent = fontSize + 'px';
            renderPreview();
        });
        prevPageBtn.addEventListener('click', () => { if (currentPage > 0) { currentPage--; renderPreview(); }});
        nextPageBtn.addEventListener('click', () => { if (currentPage < getTotalPages()-1) { currentPage++; renderPreview(); }});
        exportCurrentBtn.addEventListener('click', exportCurrent);
        exportAllBtn.addEventListener('click', exportAllAsZip);
        
        renderPreview();
        updateImageCountDisplay();
        renderThumbnails();
    })();
</script>
</body>
  </html>
