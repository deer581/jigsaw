<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>自由拼图工坊 · 灵活版</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#f5f7fb;font-family:'Segoe UI',Roboto,sans-serif;padding:16px;min-height:100vh;display:flex;justify-content:center;align-items:center}
        .app{max-width:1400px;width:100%;background:#fff;border-radius:32px;box-shadow:0 20px 40px rgba(0,0,0,0.08);padding:24px 20px 28px}
        h1{font-weight:500;font-size:2rem;color:#1e293b;margin-bottom:18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .controls{display:flex;flex-wrap:wrap;gap:16px 20px;background:#fafcff;padding:16px 20px;border-radius:24px;border:1px solid #e2e8f0;margin-bottom:24px}
        .group{display:flex;flex-direction:column;gap:5px}
        .group label{font-size:0.75rem;font-weight:600;text-transform:uppercase;color:#64748b}
        .row-inputs{display:flex;align-items:center;gap:8px}
        .row-inputs input{width:80px;padding:10px 8px;border:1.5px solid #d1d9e6;border-radius:18px;font-size:1rem;text-align:center;background:#fff}
        .row-inputs button{background:#eef2ff;border:none;border-radius:40px;padding:10px 16px;font-weight:600;color:#2563eb;cursor:pointer}
        select{padding:10px 14px;border-radius:24px;border:1.5px solid #d1d9e6;background:#fff;font-size:0.95rem}
        .upload-btn{background:#1e293b;color:#fff;padding:12px 28px;border-radius:40px;border:none;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px}
        .count{background:#e6edf8;padding:8px 18px;border-radius:40px;font-weight:500;color:#1e3a8a}
        .download-btn{background:#0b3b2c;color:#fff;border:none;padding:12px 28px;border-radius:40px;font-weight:600;cursor:pointer;margin-left:auto}
        .slider{display:flex;align-items:center;gap:12px}
        .slider input{width:180px;accent-color:#2563eb}
        .canvas-wrapper{background:#fff;border-radius:24px;padding:12px;box-shadow:0 8px 20px rgba(0,0,0,0.05);border:1px solid #eef2f6;text-align:center;overflow-x:auto}
        canvas{display:block;margin:0 auto;border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,0.1);max-width:100%;height:auto;background:#f1f5f9}
        .status{display:flex;justify-content:space-between;margin-top:18px;color:#475569;font-size:0.9rem}
        .inline-hint{font-size:0.8rem;color:#64748b;margin-left:4px}
        .quality-select{min-width:130px}
        .note{color:#64748b;font-size:0.8rem;margin-top:4px}
    </style>
</head>
<body>
<div class="app">
    <h1>🧩 自由拼图 · 灵活网格 <span style="font-size:0.9rem;background:#e9eef4;padding:4px 16px;border-radius:40px;">最多999张</span></h1>

    <div class="controls">
        <!-- 上传区 -->
        <div class="group">
            <label>📁 图片上传</label>
            <div style="display:flex;gap:8px;align-items:center">
                <button class="upload-btn" id="uploadBtn">➕ 选择图片</button>
                <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
                <span class="count" id="imgCount">0/999</span>
            </div>
        </div>

        <!-- 网格行列 (放开到50，用户可任意改) -->
        <div class="group">
            <label>🔲 网格 (1~50)</label>
            <div class="row-inputs">
                <input id="rowsInput" type="number" min="1" max="50" value="3" step="1">
                <span>✕</span>
                <input id="colsInput" type="number" min="1" max="50" value="3" step="1">
                <button id="nineBtn">九宫格 3x3</button>
                <button id="sixteenBtn" style="background:#e0e7ff;">4x4</button>
            </div>
            <div class="note">自由输入1-50行列</div>
        </div>

        <!-- 比例选择 -->
        <div class="group">
            <label>📐 画布比例</label>
            <select id="ratioSelect">
                <option value="1:1" selected>1:1 (正方形)</option>
                <option value="9:16">9:16 (竖屏)</option>
                <option value="16:9">16:9 (横屏)</option>
                <option value="4:5">4:5</option>
                <option value="2:3">2:3</option>
            </select>
        </div>

        <!-- 标号大小 -->
        <div class="group">
            <label>🔢 标号大小</label>
            <div class="slider">
                <input type="range" id="fontSlider" min="12" max="64" value="28">
                <span id="fontSizeVal">28px</span>
            </div>
        </div>

        <!-- 新增：导出清晰度选择 -->
        <div class="group">
            <label>🖼️ 导出清晰度</label>
            <select id="qualitySelect" class="quality-select">
                <option value="1">标准 (预览尺寸)</option>
                <option value="2" selected>高清 2x (推荐)</option>
                <option value="3">超清 3x</option>
                <option value="4">极致 4x</option>
                <option value="custom">自定义倍数</option>
            </select>
            <div style="display:flex;align-items:center;gap:5px;margin-top:4px;">
                <span style="font-size:0.8rem;">自定义:</span>
                <input id="customScaleInput" type="number" min="0.5" max="8" step="0.5" value="2" style="width:70px;padding:6px;border-radius:20px;border:1px solid #ccc;" disabled>
                <span style="font-size:0.8rem;">x</span>
            </div>
        </div>

        <!-- 导出按钮 -->
        <button class="download-btn" id="downloadBtn">⬇ 导出拼图</button>
    </div>

    <div class="canvas-wrapper">
        <canvas id="canvas" width="800" height="800"></canvas>
    </div>

    <div class="status">
        <span id="infoMsg">✨ 请上传图片 · 自由设置网格</span>
        <span>📌 拖动标号大小 · 可选清晰度</span>
    </div>
</div>

<script>
(function(){
    "use strict";

    // DOM 元素
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: false });
    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const imgCountSpan = document.getElementById('imgCount');
    const rowsInput = document.getElementById('rowsInput');
    const colsInput = document.getElementById('colsInput');
    const nineBtn = document.getElementById('nineBtn');
    const sixteenBtn = document.getElementById('sixteenBtn');
    const ratioSelect = document.getElementById('ratioSelect');
    const fontSlider = document.getElementById('fontSlider');
    const fontSizeVal = document.getElementById('fontSizeVal');
    const qualitySelect = document.getElementById('qualitySelect');
    const customScaleInput = document.getElementById('customScaleInput');
    const downloadBtn = document.getElementById('downloadBtn');
    const infoMsg = document.getElementById('infoMsg');

    // 状态
    let images = [];
    const MAX_IMG = 999;
    const BASE_WIDTH = 900;      // 预览基准宽度
    let canvasWidth = BASE_WIDTH;
    let canvasHeight = BASE_WIDTH;

    // ---------- 辅助函数 ----------
    function updateCount() {
        imgCountSpan.textContent = images.length + '/' + MAX_IMG;
    }

    function setStatus(text, isError = false) {
        infoMsg.textContent = text;
        infoMsg.style.color = isError ? '#b91c1c' : '#475569';
    }

    // 解析比例
    function getRatioValue() {
        const parts = ratioSelect.value.split(':').map(Number);
        return (parts[0] && parts[1]) ? parts[0] / parts[1] : 1;
    }

    // 计算画布尺寸 (基于基准宽度)
    function calcCanvasSize() {
        const ratio = getRatioValue();
        canvasWidth = BASE_WIDTH;
        canvasHeight = Math.round(BASE_WIDTH / ratio);
        if (canvasHeight < 200) canvasHeight = 200;
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
    }

    // 绘制空白占位
    function drawEmpty() {
        ctx.fillStyle = '#f1f5f9';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        ctx.font = '20px "Segoe UI", Roboto, sans-serif';
        ctx.fillStyle = '#94a3b8';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('📂 点击「选择图片」开始拼图', canvasWidth/2, canvasHeight/2);
    }

    // 绘制图片 (cover)
    function drawCover(img, x, y, w, h) {
        const imgRatio = img.naturalWidth / img.naturalHeight;
        const cellRatio = w / h;
        let sw, sh, sx, sy;
        if (imgRatio > cellRatio) {
            sh = h;
            sw = h * imgRatio;
            sx = x - (sw - w) / 2;
            sy = y;
        } else {
            sw = w;
            sh = w / imgRatio;
            sx = x;
            sy = y - (sh - h) / 2;
        }
        ctx.drawImage(img, sx, sy, sw, sh);
    }

    // 绘制标号
    function drawLabel(x, y, w, h, num, fontSize) {
        const labelHeight = Math.max(28, fontSize * 1.4);
        const bgY = y + h - labelHeight;
        const grad = ctx.createLinearGradient(x, bgY, x + w, bgY + labelHeight);
        grad.addColorStop(0, 'rgba(15,23,42,0.7)');
        grad.addColorStop(1, 'rgba(30,41,59,0.8)');
        ctx.fillStyle = grad;
        ctx.fillRect(x, bgY, w, labelHeight);
        ctx.font = '600 ' + fontSize + 'px "Segoe UI", Roboto, sans-serif';
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = '#00000040';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetX = 1;
        ctx.shadowOffsetY = 1;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(num, x + w/2, bgY + labelHeight/2);
        ctx.shadowColor = 'transparent';
        ctx.shadowBlur = 0;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
    }

    // 绘制拼图主函数
    function drawCollage() {
        if (!canvasWidth || !canvasHeight) return;

        let rows = parseInt(rowsInput.value) || 3;
        let cols = parseInt(colsInput.value) || 3;
        // 限制范围1-50
        rows = Math.min(50, Math.max(1, rows));
        cols = Math.min(50, Math.max(1, cols));
        rowsInput.value = rows;
        colsInput.value = cols;

        const cellW = canvasWidth / cols;
        const cellH = canvasHeight / rows;
        const fontSize = parseInt(fontSlider.value) || 28;

        // 背景
        ctx.fillStyle = '#e9eef4';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);

        if (!images.length) {
            drawEmpty();
            setStatus('暂无图片，请上传');
            return;
        }

        const totalCells = rows * cols;
        const used = Math.min(images.length, totalCells);

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const idx = r * cols + c;
                const x = c * cellW;
                const y = r * cellH;

                // 网格线
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 1.2;
                ctx.strokeRect(x, y, cellW, cellH);

                if (idx < images.length) {
                    const img = images[idx];
                    if (img && img.complete) {
                        drawCover(img, x, y, cellW, cellH);
                        drawLabel(x, y, cellW, cellH, idx + 1, fontSize);
                    } else {
                        ctx.fillStyle = '#cbd5e1';
                        ctx.fillRect(x, y, cellW, cellH);
                    }
                } else {
                    ctx.fillStyle = '#dee4ed';
                    ctx.fillRect(x, y, cellW, cellH);
                }
            }
        }

        setStatus(`✅ 已拼 ${used} 张 · ${rows}✕${cols} 网格 · 标号${fontSize}px`);
    }

    // 加载图片
    function loadFiles(files) {
        if (!files.length) return;
        let arr = Array.from(files).slice(0, MAX_IMG);
        images = [];
        updateCount();
        setStatus('⏳ 加载图片中...');

        const promises = arr.map(file => {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = () => resolve(null);
                img.src = URL.createObjectURL(file);
            });
        });

        Promise.all(promises).then(loaded => {
            images = loaded.filter(img => img !== null);
            updateCount();
            calcCanvasSize();
            drawCollage();
            fileInput.value = '';
        });
    }

    // 刷新绘制 (防抖)
    let timer = null;
    function scheduleRedraw() {
        if (timer) clearTimeout(timer);
        timer = setTimeout(() => {
            if (images.length) {
                calcCanvasSize();
                drawCollage();
            } else {
                drawEmpty();
            }
            timer = null;
        }, 30);
    }

    // ---------- 事件绑定 ----------
    uploadBtn.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', e => {
        if (e.target.files.length) loadFiles(e.target.files);
    });

    rowsInput.addEventListener('input', scheduleRedraw);
    colsInput.addEventListener('input', scheduleRedraw);

    nineBtn.addEventListener('click', () => {
        rowsInput.value = 3;
        colsInput.value = 3;
        scheduleRedraw();
    });

    sixteenBtn.addEventListener('click', () => {
        rowsInput.value = 4;
        colsInput.value = 4;
        scheduleRedraw();
    });

    ratioSelect.addEventListener('change', scheduleRedraw);

    fontSlider.addEventListener('input', e => {
        fontSizeVal.textContent = e.target.value + 'px';
        scheduleRedraw();
    });

    // 清晰度选择联动自定义输入框
    qualitySelect.addEventListener('change', () => {
        customScaleInput.disabled = (qualitySelect.value !== 'custom');
        if (qualitySelect.value !== 'custom') {
            // 非自定义时显示对应倍数
            const val = qualitySelect.value;
            if (val === '1') customScaleInput.value = '1';
            else if (val === '2') customScaleInput.value = '2';
            else if (val === '3') customScaleInput.value = '3';
            else if (val === '4') customScaleInput.value = '4';
        }
    });

    // 初始化字号显示
    fontSizeVal.textContent = fontSlider.value + 'px';

    // 拖拽上传
    canvas.addEventListener('dragover', e => e.preventDefault());
    canvas.addEventListener('drop', e => {
        e.preventDefault();
        if (e.dataTransfer.files.length) loadFiles(e.dataTransfer.files);
    });

    // ---------- 高清导出 (支持多级清晰度) ----------
    function getExportScale() {
        const mode = qualitySelect.value;
        if (mode === 'custom') {
            let val = parseFloat(customScaleInput.value);
            if (isNaN(val) || val < 0.5) val = 2;
            if (val > 10) val = 10;
            return val;
        }
        return parseInt(mode) || 2;
    }

    function exportImage() {
        if (!images.length) {
            setStatus('⚠️ 没有图片可导出', true);
            return;
        }

        const rows = parseInt(rowsInput.value) || 3;
        const cols = parseInt(colsInput.value) || 3;
        const ratio = getRatioValue();
        const scale = getExportScale();

        // 导出宽度 = 基准宽度 * 缩放倍数
        const exportWidth = Math.round(BASE_WIDTH * scale);
        const exportHeight = Math.round(exportWidth / ratio);

        const offCanvas = document.createElement('canvas');
        offCanvas.width = exportWidth;
        offCanvas.height = exportHeight;
        const octx = offCanvas.getContext('2d', { alpha: false });

        const cellW = exportWidth / cols;
        const cellH = exportHeight / rows;
        const baseFontSize = parseInt(fontSlider.value) || 28;
        const fontSize = Math.round(baseFontSize * scale);

        // 背景
        octx.fillStyle = '#e9eef4';
        octx.fillRect(0, 0, exportWidth, exportHeight);

        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const idx = r * cols + c;
                const x = c * cellW;
                const y = r * cellH;

                octx.strokeStyle = '#ffffff';
                octx.lineWidth = Math.max(2, 2.5 * scale);
                octx.strokeRect(x, y, cellW, cellH);

                if (idx < images.length) {
                    const img = images[idx];
                    if (img && img.complete) {
                        const imgRatio = img.naturalWidth / img.naturalHeight;
                        const cellRatio = cellW / cellH;
                        let sw, sh, sx, sy;
                        if (imgRatio > cellRatio) {
                            sh = cellH;
                            sw = cellH * imgRatio;
                            sx = x - (sw - cellW) / 2;
                            sy = y;
                        } else {
                            sw = cellW;
                            sh = cellW / imgRatio;
                            sx = x;
                            sy = y - (sh - cellH) / 2;
                        }
                        octx.drawImage(img, sx, sy, sw, sh);

                        // 绘制标号
                        const labelH = Math.max(36, fontSize * 1.4);
                        const bgY = y + cellH - labelH;
                        const grad = octx.createLinearGradient(x, bgY, x + cellW, bgY + labelH);
                        grad.addColorStop(0, 'rgba(15,23,42,0.75)');
                        grad.addColorStop(1, 'rgba(30,41,59,0.85)');
                        octx.fillStyle = grad;
                        octx.fillRect(x, bgY, cellW, labelH);
                        octx.font = '600 ' + fontSize + 'px "Segoe UI", Roboto, sans-serif';
                        octx.fillStyle = '#ffffff';
                        octx.shadowColor = '#00000060';
                        octx.shadowBlur = 12 * scale;
                        octx.shadowOffsetX = 2 * scale;
                        octx.shadowOffsetY = 2 * scale;
                        octx.textAlign = 'center';
                        octx.textBaseline = 'middle';
                        octx.fillText(idx + 1, x + cellW/2, bgY + labelH/2);
                        octx.shadowColor = 'transparent';
                    } else {
                        octx.fillStyle = '#b0bec5';
                        octx.fillRect(x, y, cellW, cellH);
                    }
                } else {
                    octx.fillStyle = '#d9e2ec';
                    octx.fillRect(x, y, cellW, cellH);
                }
            }
        }

        // 下载
        const link = document.createElement('a');
        link.download = `拼图_${rows}x${cols}_${scale}x.png`;
        link.href = offCanvas.toDataURL('image/png');
        link.click();

        setStatus(`📸 已导出 ${exportWidth}x${exportHeight} (${scale}x 清晰度)`);
    }

    downloadBtn.addEventListener('click', exportImage);

    // 初始化
    calcCanvasSize();
    drawEmpty();
    updateCount();
    qualitySelect.dispatchEvent(new Event('change')); // 初始化自定义框状态

    // 全局防误触: 数字输入限制
    rowsInput.addEventListener('blur', () => {
        let v = parseInt(rowsInput.value);
        if (v < 1) rowsInput.value = 1;
        if (v > 50) rowsInput.value = 50;
        scheduleRedraw();
    });
    colsInput.addEventListener('blur', () => {
        let v = parseInt(colsInput.value);
        if (v < 1) colsInput.value = 1;
        if (v > 50) colsInput.value = 50;
        scheduleRedraw();
    });

})();
</script>
</body>
                  </html>
