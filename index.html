<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>自由拼图工坊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f7fb;font-family:'Segoe UI',Roboto,sans-serif;padding:16px;min-height:100vh;display:flex;justify-content:center;align-items:center}
.app{max-width:1300px;width:100%;background:#fff;border-radius:32px;box-shadow:0 20px 40px rgba(0,0,0,0.08);padding:24px 20px 28px}
h1{font-weight:500;font-size:2rem;color:#1e293b;margin-bottom:18px;display:flex;align-items:center;gap:8px}
.controls{display:flex;flex-wrap:wrap;gap:16px 20px;background:#fafcff;padding:16px 20px;border-radius:24px;border:1px solid #e2e8f0;margin-bottom:24px}
.group{display:flex;flex-direction:column;gap:5px}
.group label{font-size:0.75rem;font-weight:600;text-transform:uppercase;color:#64748b}
.row-inputs{display:flex;align-items:center;gap:8px}
.row-inputs input{width:80px;padding:10px 8px;border:1.5px solid #d1d9e6;border-radius:18px;font-size:1rem;text-align:center;background:#fff}
.row-inputs button{background:#eef2ff;border:none;border-radius:40px;padding:10px 16px;font-weight:600;color:#2563eb;cursor:pointer}
select{padding:10px 14px;border-radius:24px;border:1.5px solid #d1d9e6;background:#fff;font-size:0.95rem}
.upload-btn{background:#1e293b;color:#fff;padding:12px 28px;border-radius:40px;border:none;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:8px}
.count{background:#e6edf8;padding:8px 18px;border-radius:40px;font-weight:500;color:#1e3a8a}
.download-btn{background:#0b3b2c;color:#fff;border:none;padding:12px 28px;border-radius:40px;font-weight:600;cursor:pointer;margin-left:auto}
.slider{display:flex;align-items:center;gap:12px}
.slider input{width:180px;accent-color:#2563eb}
.canvas-wrapper{background:#fff;border-radius:24px;padding:12px;box-shadow:0 8px 20px rgba(0,0,0,0.05);border:1px solid #eef2f6;text-align:center;overflow-x:auto}
canvas{display:block;margin:0 auto;border-radius:18px;box-shadow:0 6px 18px rgba(0,0,0,0.1);max-width:100%;height:auto;background:#f1f5f9}
.status{display:flex;justify-content:space-between;margin-top:18px;color:#475569;font-size:0.9rem}
</style>
</head>
<body>
<div class="app">
<h1>🧩 拼图·网格工坊 <span style="font-size:0.9rem;background:#e9eef4;padding:4px 16px;border-radius:40px;">最多999张</span></h1>
<div class="controls">
<div class="group"><label>📁 图片上传</label><div style="display:flex;gap:8px;align-items:center"><button class="upload-btn" id="uploadBtn">➕ 选择图片</button><input type="file" id="fileInput" accept="image/*" multiple style="display:none"><span class="count" id="imgCount">0/999</span></div></div>
<div class="group"><label>🔲 网格</label><div class="row-inputs"><input id="rowsInput" type="number" min="1" max="30" value="3"><span>✕</span><input id="colsInput" type="number" min="1" max="30" value="3"><button id="nineBtn">九宫格</button></div></div>
<div class="group"><label>📐 比例</label><select id="ratioSelect"><option value="1:1" selected>1:1</option><option value="9:16">9:16</option><option value="16:9">16:9</option></select></div>
<div class="group"><label>🔢 标号大小</label><div class="slider"><input type="range" id="fontSlider" min="12" max="56" value="28"><span id="fontSizeVal">28px</span></div></div>
<button class="download-btn" id="downloadBtn">⬇ 高清导出</button>
</div>
<div class="canvas-wrapper"><canvas id="canvas" width="800" height="800"></canvas></div>
<div class="status"><span id="infoMsg">✨ 请上传图片</span><span>📌 标号可调</span></div>
</div>
<script>
(function(){
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d',{alpha:false});
const fileInput=document.getElementById('fileInput'),uploadBtn=document.getElementById('uploadBtn'),imgCountSpan=document.getElementById('imgCount');
const rowsInput=document.getElementById('rowsInput'),colsInput=document.getElementById('colsInput');
const ratioSelect=document.getElementById('ratioSelect'),fontSlider=document.getElementById('fontSlider'),fontSizeVal=document.getElementById('fontSizeVal');
const downloadBtn=document.getElementById('downloadBtn'),infoMsg=document.getElementById('infoMsg');
let images=[],MAX_IMG=999,BASE_W=900,canvasW=BASE_W,canvasH=BASE_W;
function updateCount(){imgCountSpan.textContent=images.length+'/'+MAX_IMG;}
function setStatus(t,err){infoMsg.textContent=t;infoMsg.style.color=err?'#b91c1c':'#475569';}
function calcSize(){let r=ratioSelect.value.split(':').map(Number);let ratio=r[0]/r[1]||1;canvasW=BASE_W;canvasH=Math.round(BASE_W/ratio);if(canvasH<200)canvasH=200;canvas.width=canvasW;canvas.height=canvasH;}
function drawEmpty(){ctx.fillStyle='#f1f5f9';ctx.fillRect(0,0,canvasW,canvasH);ctx.font='20px Segoe UI';ctx.fillStyle='#94a3b8';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('📂 点击选择图片',canvasW/2,canvasH/2);}
function drawCover(img,x,y,w,h){let ir=img.naturalWidth/img.naturalHeight,cr=w/h;let sw,sh,sx,sy;if(ir>cr){sh=h;sw=h*ir;sx=x-(sw-w)/2;sy=y;}else{sw=w;sh=w/ir;sx=x;sy=y-(sh-h)/2;}ctx.drawImage(img,sx,sy,sw,sh);}
function drawLabel(x,y,w,h,num,fs){let lh=Math.max(28,fs*1.4),bgY=y+h-lh;let grad=ctx.createLinearGradient(x,bgY,x+w,bgY+lh);grad.addColorStop(0,'rgba(15,23,42,0.7)');grad.addColorStop(1,'rgba(30,41,59,0.8)');ctx.fillStyle=grad;ctx.fillRect(x,bgY,w,lh);ctx.font='600 '+fs+'px Segoe UI';ctx.fillStyle='#fff';ctx.shadowColor='#00000040';ctx.shadowBlur=8;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(num,x+w/2,bgY+lh/2);ctx.shadowColor='transparent';}
function drawCollage(){if(!canvasW||!canvasH)return;let rows=parseInt(rowsInput.value)||3,cols=parseInt(colsInput.value)||3;rows=Math.min(30,Math.max(1,rows));cols=Math.min(30,Math.max(1,cols));rowsInput.value=rows;colsInput.value=cols;let cw=canvasW/cols,ch=canvasH/rows,fs=parseInt(fontSlider.value)||28;ctx.fillStyle='#e9eef4';ctx.fillRect(0,0,canvasW,canvasH);if(!images.length){drawEmpty();setStatus('暂无图片');return;}for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){let idx=r*cols+c,x=c*cw,y=r*ch;ctx.strokeStyle='#fff';ctx.lineWidth=1.2;ctx.strokeRect(x,y,cw,ch);if(idx<images.length){let img=images[idx];if(img&&img.complete){drawCover(img,x,y,cw,ch);drawLabel(x,y,cw,ch,idx+1,fs);}else{ctx.fillStyle='#cbd5e1';ctx.fillRect(x,y,cw,ch);}}else{ctx.fillStyle='#dee4ed';ctx.fillRect(x,y,cw,ch);}}}setStatus('✅ '+Math.min(images.length,rows*cols)+' 张拼图 · '+rows+'x'+cols);}
function loadFiles(files){if(!files.length)return;let arr=Array.from(files).slice(0,MAX_IMG);images=[];updateCount();setStatus('加载中...');let promises=arr.map(f=>new Promise(res=>{let img=new Image();img.onload=()=>res(img);img.onerror=()=>res(null);img.src=URL.createObjectURL(f);}));Promise.all(promises).then(imgs=>{images=imgs.filter(i=>i);updateCount();calcSize();drawCollage();});fileInput.value='';}
uploadBtn.onclick=()=>fileInput.click();
fileInput.onchange=e=>{if(e.target.files.length)loadFiles(e.target.files);};
rowsInput.oninput=colsInput.oninput=()=>{if(images.length){calcSize();drawCollage();}};
nineBtn.onclick=()=>{rowsInput.value=3;colsInput.value=3;calcSize();drawCollage();};
ratioSelect.onchange=()=>{calcSize();drawCollage();};
fontSlider.oninput=e=>{fontSizeVal.textContent=e.target.value+'px';if(images.length)drawCollage();};
fontSizeVal.textContent=fontSlider.value+'px';
function exportHD(){if(!images.length){setStatus('无图片',1);return;}let rows=parseInt(rowsInput.value)||3,cols=parseInt(colsInput.value)||3;let r=ratioSelect.value.split(':').map(Number),ratio=r[0]/r[1]||1;let expW=4000,expH=Math.round(expW/ratio);let offC=document.createElement('canvas');offC.width=expW;offC.height=expH;let octx=offC.getContext('2d');let cw=expW/cols,ch=expH/rows;let fs=Math.round(parseInt(fontSlider.value)*(expW/BASE_W));octx.fillStyle='#e9eef4';octx.fillRect(0,0,expW,expH);for(let r=0;r<rows;r++){for(let c=0;c<cols;c++){let idx=r*cols+c,x=c*cw,y=r*ch;octx.strokeStyle='#fff';octx.lineWidth=2.5;octx.strokeRect(x,y,cw,ch);if(idx<images.length){let img=images[idx];if(img&&img.complete){let ir=img.naturalWidth/img.naturalHeight,cr=cw/ch;let sw,sh,sx,sy;if(ir>cr){sh=ch;sw=ch*ir;sx=x-(sw-cw)/2;sy=y;}else{sw=cw;sh=cw/ir;sx=x;sy=y-(sh-ch)/2;}octx.drawImage(img,sx,sy,sw,sh);let lh=Math.max(36,fs*1.4),bgY=y+ch-lh;let grad=octx.createLinearGradient(x,bgY,x+cw,bgY+lh);grad.addColorStop(0,'rgba(15,23,42,0.75)');grad.addColorStop(1,'rgba(30,41,59,0.85)');octx.fillStyle=grad;octx.fillRect(x,bgY,cw,lh);octx.font='600 '+fs+'px Segoe UI';octx.fillStyle='#fff';octx.shadowColor='#00000060';octx.shadowBlur=12;octx.textAlign='center';octx.textBaseline='middle';octx.fillText(idx+1,x+cw/2,bgY+lh/2);octx.shadowColor='transparent';}}}}let a=document.createElement('a');a.download='拼图_'+rows+'x'+cols+'.png';a.href=offC.toDataURL('image/png');a.click();setStatus('📸 已导出 '+expW+'x'+expH);}
downloadBtn.onclick=exportHD;
calcSize();drawEmpty();updateCount();
canvas.addEventListener('dragover',e=>e.preventDefault());
canvas.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files.length)loadFiles(e.dataTransfer.files);});
})();
</script>
</body>
</html>
